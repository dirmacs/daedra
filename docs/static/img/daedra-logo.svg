<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)" stroke="url(#glow)" stroke-width="3"/>
  <!-- Magnifying glass body -->
  <circle cx="54" cy="52" r="22" fill="none" stroke="#e94560" stroke-width="4"/>
  <!-- Magnifying glass handle -->
  <line x1="70" y1="68" x2="92" y2="90" stroke="#e94560" stroke-width="5" stroke-linecap="round"/>
  <!-- Search lines inside glass -->
  <line x1="40" y1="46" x2="68" y2="46" stroke="#0f3460" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="54" x2="62" y2="54" stroke="#0f3460" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="62" x2="56" y2="62" stroke="#0f3460" stroke-width="3" stroke-linecap="round"/>
  <!-- Fallback arrows (small, bottom right) -->
  <path d="M 82 42 L 90 42 L 86 38" fill="none" stroke="#e94560" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 86 42 L 86 50 L 90 46" fill="none" stroke="#e94560" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
